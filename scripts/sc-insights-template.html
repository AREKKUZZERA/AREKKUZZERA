<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoundCloud Insights</title>
  <style>
    :root {
      --text: #f7f7f7;
      --muted: #c8d0d8;
      --chip: #303030;
      --chip-light: #f4f4f4;
      --bar: #3f3f3f;
      --grid: rgba(255, 255, 255, 0.065);
      --axis: #a8cbff;
      --pink-top: #ff78b5;
      --pink-bottom: #ee2f8b;
      --green: #00e879;
      --border: rgba(255, 255, 255, 0.16);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 1200px;
      height: 690px;
      overflow: hidden;
      background: transparent;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .mockup {
      width: 1200px;
      height: 690px;
      padding: 8px 30px 20px 42px;
      background: transparent;
      overflow: hidden;
      position: relative;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.72);
    }

    .topbar {
      display: flex;
      align-items: flex-start;
    }

    h1 {
      margin: 0;
      font-size: 56px;
      line-height: 0.95;
      font-weight: 950;
      letter-spacing: 0;
    }

    .headline {
      margin-top: 52px;
      display: flex;
      align-items: baseline;
      gap: 11px;
      flex-wrap: wrap;
    }

    .headline-main,
    .headline-green {
      font-size: 58px;
      line-height: 0.96;
      font-weight: 950;
      letter-spacing: 0;
    }

    .headline-green {
      color: var(--green);
    }

    .stats-row {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      text-shadow: none;
    }

    .chip {
      height: 44px;
      border-radius: 999px;
      background: var(--chip);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 17px;
      color: #fff;
      font-size: 13px;
      font-weight: 850;
      white-space: nowrap;
    }

    .chip.primary {
      background: var(--chip-light);
      color: #111;
    }

    .chip svg {
      display: block;
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
    }

    .chart-wrap {
      margin-top: 42px;
      position: relative;
      padding-left: 64px;
      padding-right: 0;
    }

    .y-axis {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 29px;
      width: 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: var(--axis);
      font-size: 13px;
      font-weight: 850;
    }

    .chart {
      height: 342px;
      position: relative;
      border-bottom: 1px solid var(--grid);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      padding: 0 8px 30px 0;
      background-image:
        linear-gradient(to top, transparent 0, transparent calc(20% - 0.5px), var(--grid) calc(20% - 0.5px), var(--grid) 20%, transparent 20%),
        linear-gradient(to top, transparent 0, transparent calc(40% - 0.5px), var(--grid) calc(40% - 0.5px), var(--grid) 40%, transparent 40%),
        linear-gradient(to top, transparent 0, transparent calc(60% - 0.5px), var(--grid) calc(60% - 0.5px), var(--grid) 60%, transparent 60%),
        linear-gradient(to top, transparent 0, transparent calc(80% - 0.5px), var(--grid) calc(80% - 0.5px), var(--grid) 80%, transparent 80%);
    }

    .bar-col {
      width: 74px;
      height: 342px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      gap: 14px;
    }

    .bar {
      width: 74px;
      min-height: 5px;
      border-radius: 8px 8px 0 0;
      position: relative;
    }

    .bar.past {
      background: linear-gradient(180deg, #464646 0%, var(--bar) 100%);
    }

    .bar.current {
      background: linear-gradient(180deg, var(--pink-top) 0%, var(--pink-bottom) 100%);
      box-shadow: 0 0 34px rgba(238, 47, 139, 0.42), 0 18px 26px rgba(238, 47, 139, 0.2);
    }

    .year {
      color: var(--axis);
      font-size: 13px;
      font-weight: 850;
      line-height: 1;
    }
  </style>
</head>
<body>
  <section class="mockup">
    <div class="topbar">
      <h1>Insights</h1>
    </div>

    <div class="headline">
      <div class="headline-main">{{TOTAL_PLAYS}} plays since {{SINCE_YEAR}}</div>
      <div class="headline-green">{{GROWTH_BADGE}}</div>
    </div>

    <div class="stats-row">
      <div class="chip primary">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 4l12 8-12 8V4z"/></svg>
        {{PLAYS_CHIP}} plays
      </div>
      <div class="chip">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.4-9.4-8.6C.7 9 .9 5.2 3.7 3.4 6 1.9 9 2.5 12 5.6c3-3.1 6-3.7 8.3-2.2 2.8 1.8 3 5.6 1.1 9C19 16.6 12 21 12 21z"/></svg>
        {{LIKES}} likes
      </div>
      <div class="chip">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16v11H8l-4 4V4z"/></svg>
        {{COMMENTS}} comments
      </div>
      <div class="chip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a3 3 0 0 1 3-3h15"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a3 3 0 0 1-3 3H3"/></svg>
        {{REPOSTS}} reposts
      </div>
      <div class="chip">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3.5v8"/><path d="M6.75 8.75L10 12l3.25-3.25"/><path d="M4 15.5h12"/></svg>
        {{DOWNLOADS}} {{DOWNLOAD_LABEL}}
      </div>
    </div>

    <div class="chart-wrap">
      <div class="y-axis">
        <span>{{Y_LABEL_0}}</span>
        <span>{{Y_LABEL_1}}</span>
        <span>{{Y_LABEL_2}}</span>
        <span>{{Y_LABEL_3}}</span>
        <span>{{Y_LABEL_4}}</span>
        <span>{{Y_LABEL_5}}</span>
      </div>

      <div class="chart">
        {{BARS}}
      </div>
    </div>
  </section>
</body>
</html>
