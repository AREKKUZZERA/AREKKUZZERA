<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insights Mockup</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-2: #0d1117;
      --text: #f8f5f0;
      --muted: #d8cfc3;
      --chip: #303238;
      --bar: #69696c;
      --axis: #a8c5ff;
      --pink-top: #f075b0;
      --pink-bottom: #ec2f86;
      --green: #13f26f;
      --border: rgba(255,255,255,0.12);
      --grid: rgba(255,255,255,0.05);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .mockup {
      width: min(960px, 100%);
      min-height: 586px;
      padding: 10px 14px 18px;
      background: var(--bg);
      overflow: hidden;
      position: relative;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
      transform: translateY(-6px);
    }

    h1 {
      margin: 0;
      font-size: 58px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.01em;
    }

    .filter {
      background: #1f232b;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 13px;
      padding: 12px 16px;
      min-width: 110px;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      margin-top: 16px;
    }

    .chevron {
      width: 10px;
      height: 10px;
      border-right: 2px solid #f6f0e8;
      border-bottom: 2px solid #f6f0e8;
      transform: rotate(45deg) translateY(-2px);
      margin-left: 10px;
    }

    .section-label {
      margin-top: 2px;
      font-size: 17px;
      font-weight: 800;
    }

    .section-line {
      width: 65px;
      height: 4px;
      border-radius: 999px;
      background: var(--text);
      margin-top: 6px;
    }

    .headline {
      margin-top: 18px;
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
    }

    .headline-main {
      font-size: 51px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .headline-green {
      font-size: 47px;
      line-height: 1;
      color: var(--green);
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .stats-row {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .chip {
      height: 34px;
      border-radius: 999px;
      background: var(--chip);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      white-space: nowrap;
    }

    .chip.primary {
      background: #f4f1ec;
      color: #111318;
    }

    .primary .icon-circle::before {
      content: "";
      position: absolute;
      left: 5px;
      top: 3px;
      border-left: 6px solid #111318;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
    }

    .repost-icon,
    .download-icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .repost-icon {
      color: #ffffff;
    }

    .download-icon {
      color: #c9baff;
    }

    .repost-icon svg,
    .download-icon svg {
      display: block;
    }

    .meta {
      margin-left: 640px;
      display: flex;
      gap: 22px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .meta strong {
      color: var(--text);
      font-weight: 800;
    }

    .chart-wrap {
      margin-top: 16px;
      position: relative;
      padding-left: 56px;
      padding-right: 18px;
      padding-bottom: 24px;
    }

    .y-axis {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 22px;
      width: 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: var(--axis);
      font-size: 12px;
      font-weight: 700;
    }

    .chart {
      height: 300px;
      position: relative;
      border-bottom: 1px solid var(--grid);
      display: flex;
      align-items: flex-end;
      gap: 17px;
      padding: 0 8px 0 8px;
      background-image:
        linear-gradient(to top, transparent 0, transparent calc(20% - 0.5px), var(--grid) calc(20% - 0.5px), var(--grid) 20%, transparent 20%),
        linear-gradient(to top, transparent 0, transparent calc(40% - 0.5px), var(--grid) calc(40% - 0.5px), var(--grid) 40%, transparent 40%),
        linear-gradient(to top, transparent 0, transparent calc(60% - 0.5px), var(--grid) calc(60% - 0.5px), var(--grid) 60%, transparent 60%),
        linear-gradient(to top, transparent 0, transparent calc(80% - 0.5px), var(--grid) calc(80% - 0.5px), var(--grid) 80%, transparent 80%);
    }

    .bar-col {
      width: 60px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
    }

    .bar {
      width: 60px;
      height: 280px;
      border-radius: 6px;
      background: var(--bar);
      position: relative;
      overflow: visible;
    }

    .fill {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      border-radius: 7px;
      background: linear-gradient(180deg, var(--pink-top), var(--pink-bottom));
      box-shadow: 0 0 28px rgba(236, 47, 134, 0.4), 0 12px 24px rgba(236, 47, 134, 0.18);
    }

    .year {
      color: var(--axis);
      font-size: 12px;
      font-weight: 700;
      margin-top: 0;
      line-height: 1;
    }

    @media (max-width: 900px) {
      .headline-main { font-size: 42px; }
      .headline-green { font-size: 40px; }
      .meta { width: 100%; margin-left: 0; }
      .mockup { min-height: auto; }
      .chart-wrap { overflow-x: auto; }
      .chart-inner { min-width: 860px; }
    }
  </style>
</head>
<body>
  <section class="mockup">
    <div class="topbar">
      <h1>Insights</h1>
      <div class="filter">All time <span class="chevron"></span></div>
    </div>

    <div class="section-label">SoundCloud</div>
    <div class="section-line"></div>

    <div class="headline">
      <div class="headline-main">{{TOTAL_PLAYS}} plays since {{SINCE_YEAR}}</div>
    </div>

    <div class="stats-row">
      <div class="chip primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M5 3l14 9-14 9V3z"/>
        </svg>
        {{PLAYS_CHIP}} plays
      </div>

      <div class="chip">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.8 4.6c-1.5-1.6-4-1.6-5.5 0L12 8l-3.3-3.4c-1.5-1.6-4-1.6-5.5 0-1.6 1.7-1.6 4.4 0 6.1L12 21l8.8-10.3c1.6-1.7 1.6-4.4 0-6.1z"/>
        </svg>
        {{LIKES}} likes
      </div>

      <div class="chip">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V5a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
        </svg>
        {{COMMENTS}} comments
      </div>
      <div class="chip">
        <span class="repost-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 1l4 4-4 4"/>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <path d="M7 23l-4-4 4-4"/>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </span>
        {{REPOSTS}} reposts
      </div>
      <div class="chip"><span class="download-icon" aria-hidden="true"><svg viewBox="0 0 20 20" width="16" height="16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 3.5V11.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M6.75 8.75L10 12L13.25 8.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 15.5H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>{{DOWNLOADS}} download</div>
      <div class="meta">
      </div>
    </div>

    <div class="chart-wrap">
      <div class="y-axis">
        <span>{{Y_LABEL_0}}</span>
        <span>{{Y_LABEL_1}}</span>
        <span>{{Y_LABEL_2}}</span>
        <span>{{Y_LABEL_3}}</span>
        <span>{{Y_LABEL_4}}</span>
        <span>{{Y_LABEL_5}}</span>
      </div>

      <div class="chart-inner">
        <div class="chart" style="transform: translateY(-6px);">
          {{BARS}}
        </div>
      </div>
    </div>
  </section>
</body>
</html>
